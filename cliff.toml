# cliff.toml — git-cliff changelog configuration
# Docs: https://git-cliff.org/docs/configuration

# ── GitHub integration ─────────────────────────────────────────────────────────
[remote.github]
owner = "ktestify"
repo  = "ktestify-plugin-notifications"

# ── Changelog layout ──────────────────────────────────────────────────────────
[changelog]
header = """
# Changelog

All notable changes to this project will be documented in this file.\n
"""

body = """
{% if version -%}
    ## [{{ version | trim_start_matches(pat="v") }}] — {{ timestamp | date(format="%Y-%m-%d") }}
{% else -%}
    ## [Unreleased]
{%- endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}
{% for commit in commits %}
- {% if commit.breaking %}⚠️ **BREAKING** {% endif %}\
{{ commit.message | split(pat="\n") | first | upper_first | trim }}\
{% if commit.scope %} *({{ commit.scope }})*{% endif %}\
{% if commit.remote.username %} — [@{{ commit.remote.username }}](https://github.com/{{ commit.remote.username }}){% endif %}\
{% if commit.remote.pr_number %} ([#{{ commit.remote.pr_number }}](https://github.com/ktestify/ktestify-plugin-myplugin/pull/{{ commit.remote.pr_number }})){% endif %}
{% endfor %}
{% endfor %}\
{% if github.contributors | filter(attribute="is_first_time", value=true) | length != 0 %}
###  New Contributors
{% for contributor in github.contributors | filter(attribute="is_first_time", value=true) %}
{% if contributor.pr_number %}- @{{ contributor.username }} made their first contribution \
in [#{{ contributor.pr_number }}](https://github.com/ktestify/ktestify-plugin-myplugin/pull/{{ contributor.pr_number }})
{% endif %}
{%- endfor %}
{% endif %}\n
"""

footer = """
---
*Generated by [git-cliff](https://github.com/orhun/git-cliff)*
"""
trim = true

# ── Git commit parsing ────────────────────────────────────────────────────────
[git]
conventional_commits   = true
filter_unconventional  = false
split_commits          = false

commit_parsers = [
    { message = "^Merge",                skip = true },
    { message = "^chore\\(release\\)",   skip = true },
    { message = "^deps\\(ci\\)",          skip = true },
    { message = "^style",                skip = true },
    { message = "^docs\\(changelog\\)",  skip = true },
    { message = "^deps",                 group = "⬆️ Dependency Updates" },
    { message = "^feat",               group = "✨ Features"       },
    { message = "^fix",                group = " Bug Fixes"      },
    { message = "^perf",               group = "⚡ Performance"    },
    { message = "^refactor",           group = "♻️ Refactoring"    },
    { message = "^test",               group = " Tests"          },
    { message = "^doc",                group = " Documentation"  },
    { message = "^revert",             group = "⏪ Reverts"         },
    { message = "^chore",              group = " Miscellaneous"  },
    { message = ".*",                  skip = true },
]

protect_breaking_commits = true
filter_commits           = false
tag_pattern              = "v[0-9].*"
skip_tags                = "alpha|beta"
ignore_tags              = "rc"
topo_order               = false
sort_commits             = "oldest"

link_parsers = [
    { pattern = "#(\\d+)", href = "https://github.com/ktestify/ktestify-plugin-notifications/issues/$1" },
]

# ── Automatic version bumping ─────────────────────────────────────────────────
[bump]
features_always_bump_minor  = true
breaking_always_bump_major  = true
initial_tag                 = "0.1.0"

