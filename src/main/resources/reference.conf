# ktestify-plugin-notifications,  Default Configuration
# ===========================================================
# All values can be overridden in your application.conf or via the corresponding environment variable.
# Triple-quoted HOCON strings (""") are supported for inline channel templates.

ktestify.plugins.notifications {

  # ── Master switch ────────────────────────────────────────────────────────────
  # Set to true to enable notifications. Off by default so the plugin has zero
  # overhead unless explicitly activated.
  enabled         = false
  enabled         = ${?KTESTIFY_NOTIFICATIONS_ENABLED}

  # When true, only FAILED suite runs trigger notifications (global default;
  # each channel can override individually).
  on-failure-only = false
  on-failure-only = ${?KTESTIFY_NOTIFICATIONS_ON_FAILURE_ONLY}

  # ── Suite metadata ───────────────────────────────────────────────────────────
  suite {
    # Displayed in the notification header.
    name        = "ktestify Test Suite"
    name        = ${?KTESTIFY_NOTIFICATIONS_SUITE_NAME}

    # Environment label (e.g. "staging", "prod"). Empty string if not set.
    environment = ""
    environment = ${?KTESTIFY_ENV}

    # Link to the published HTML report (e.g. GitLab Pages, Allure). Optional.
    report-url  = ""
    report-url  = ${?KTESTIFY_REPORT_URL}
  }

  # ── Success-rate visual thresholds ──────────────────────────────────────────
  # Maps success rate % to a visual style used in card templates.
  #   >= good    → "good"      (green)
  #   >= warning → "warning"   (yellow)
  #   <  warning → "attention" (red)
  thresholds {
    good    = 75
    warning = 50
  }

  # ── Tag-based scenario grouping ──────────────────────────────────────────────
  # Scenarios are grouped by their Cucumber tags and reported per group.
  # Scenarios that match no configured tag are grouped under "Untagged".
  #
  # Example:
  #   groups = [
  #     { tag = "orders",   label = "Order Service",   emoji = "📦" },
  #     { tag = "payments", label = "Payment Service", emoji = "💳" }
  #   ]
  groups = []

  # ── Notification channels ────────────────────────────────────────────────────
  # Each entry in the list configures one outbound channel.
  # Supported types: "log", "teams", "slack", "webhook"
  #
  # Template configuration:
  #   template = "builtin"            → use the bundled default template
  #   template = "classpath:my.json"  → load from classpath resource
  #   template = "/opt/config/t.json" → load from filesystem path
  #   template {                      → inline HOCON triple-quoted strings
  #     suite  = """{ ... {{suiteName}} ... }"""
  #     group  = """{ ... {{groupLabel}} ... }"""
  #     footer = """{ ... {{reportUrl}} ... }"""
  #   }
  channels = [
    # ── Log channel (always-on, zero dependencies) ───────────────────────────
    {
      type            = "log"
      enabled         = true
      on-failure-only = false
    }

    # ── Microsoft Teams ──────────────────────────────────────────────────────
    # {
    #   type            = "teams"
    #   enabled         = false
    #   webhook-url     = ${?KTESTIFY_TEAMS_WEBHOOK_URL}
    #   on-failure-only = false
    #   template        = "builtin"
    # }

    # ── Slack ────────────────────────────────────────────────────────────────
    # {
    #   type            = "slack"
    #   enabled         = false
    #   webhook-url     = ${?KTESTIFY_SLACK_WEBHOOK_URL}
    #   on-failure-only = true
    #   template        = "builtin"
    # }

    # ── Generic HTTP Webhook ─────────────────────────────────────────────────
    # {
    #   type            = "webhook"
    #   enabled         = false
    #   url             = ${?KTESTIFY_WEBHOOK_URL}
    #   method          = "POST"
    #   headers {
    #     Content-Type  = "application/json"
    #     Authorization = "Bearer "${?KTESTIFY_WEBHOOK_TOKEN}
    #   }
    #   on-failure-only = false
    #   template        = "builtin"
    # }
  ]
}
