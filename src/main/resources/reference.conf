# ktestify MyPlugin Plugin — Default Configuration
# ===========================================================
# TODO: Rename the HOCON key from 'my-plugin' to your actual plugin ID.
# TODO: Replace auth fields and env var names with your transport's specifics.
# Override any value in your application.conf or via the corresponding environment variable.

ktestify.plugins.my-plugin {

  # ── Connection / Authentication ─────────────────────────────────────────────
  # TODO: Replace with your transport-specific connection settings.
  # Example below mirrors a "connection-string" pattern.

  # Primary connection string (recommended — highest priority).
  connection-string = ""
  connection-string = ${?KTESTIFY_MYPLUGIN_CONNECTION_STRING}

  # ── Timing ──────────────────────────────────────────────────────────────────

  # Maximum time to wait for a record to appear before failing the step.
  # Overridden per-step via the 'readTimeout' DataTable column (seconds).
  read-timeout = 30s
  read-timeout = ${?KTESTIFY_MYPLUGIN_READ_TIMEOUT}

  # Interval between existence-check polls when waiting for a record.
  poll-interval = 500ms
}

