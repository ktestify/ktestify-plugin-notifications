# =============================================================================
# Log4j2 Properties ? ktestify-plugin-myplugin
# TODO: Replace 'myplugin' with your plugin's short name.
# =============================================================================
status = warn
name  = KtestifyMyPlugin

property.LOG_FILE = target/logs/ktestify-myplugin.log

property.CONSOLE_PATTERN = %style{%d{HH:mm:ss.SSS}}{bright,black} %highlight{[%t] %-5level}{FATAL=red bold blink, ERROR=red bold, WARN=yellow bold, INFO=bright green, DEBUG=cyan, TRACE=white} %style{%logger{36}}{bright,blue} - %highlight{%msg%n}{FATAL=red, ERROR=red, WARN=yellow, INFO=default, DEBUG=default, TRACE=default}
property.FILE_PATTERN = %d{yyyy-MM-dd HH:mm:ss.SSS} [%t] %-5level %logger{50} - %msg%n

appender.console.type                        = Console
appender.console.name                        = CONSOLE
appender.console.target                      = SYSTEM_OUT
appender.console.layout.type                 = PatternLayout
appender.console.layout.pattern              = ${CONSOLE_PATTERN}
appender.console.layout.disableAnsi          = false

appender.file.type                           = RollingFile
appender.file.name                           = FILE
appender.file.fileName                       = ${LOG_FILE}
appender.file.filePattern                    = target/logs/ktestify-myplugin-%d{yyyy-MM-dd}-%i.log.gz
appender.file.append                         = false
appender.file.layout.type                    = PatternLayout
appender.file.layout.pattern                 = ${FILE_PATTERN}
appender.file.policies.type                  = Policies
appender.file.policies.startup.type          = OnStartupTriggeringPolicy
appender.file.policies.size.type             = SizeBasedTriggeringPolicy
appender.file.policies.size.size             = 10 MB
appender.file.strategy.type                  = DefaultRolloverStrategy
appender.file.strategy.max                   = 5

rootLogger.level                             = INFO
rootLogger.appenderRef.console.ref           = CONSOLE

