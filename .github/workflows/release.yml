# ============================================================
# Release — Publish to Maven Central
#
# Workflow:
#   1. Developer triggers this workflow manually and provides:
#        • release version  (e.g. 0.3.0)
#        • next dev version (e.g. 0.3.1-SNAPSHOT)
#   2. Release version is set in pom.xml via `versions:set`.
#   3. Full build runs with the `release` Maven profile
#      (GPG signing + central-publishing-maven-plugin).
#   4. Artifact is published to Maven Central.
#   5. Git is tagged and pom.xml is bumped to next SNAPSHOT.
#   6. A GitHub Release is created with auto-generated notes.
#
# Required secrets (set in Settings → Secrets → Actions):
#   KTESTIFY_CHANGELOG_PAT — PAT with repo scope; used for checkout, git push,
#                            tagging, and GitHub Release creation (bypasses main
#                            branch ruleset that blocks github-actions[bot])
#   CENTRAL_USERNAME    — Maven Central Portal username token
#   CENTRAL_PASSWORD    — Maven Central Portal password token
#   GPG_PRIVATE_KEY     — ASCII-armored GPG private key
#   GPG_PASSPHRASE      — Passphrase for the GPG key
#
# The job runs inside a `release` GitHub Environment so a
# mandatory approval gate can be configured there.
# ============================================================
name: Release

on:
  workflow_dispatch:
    inputs:
      release-version:
        description: "Release version — no 'v' prefix, no '-SNAPSHOT' (e.g. 0.3.0)"
        required: true
        type: string
      next-snapshot-version:
        description: "Next development version — must end with -SNAPSHOT (e.g. 0.3.1-SNAPSHOT)"
        required: true
        type: string
      dry-run:
        description: "Dry run — build & sign but skip publish, tag & GitHub Release"
        required: false
        default: "false"
        type: choice
        options: [ "false", "true" ]

# FIX 1: Single permissions block — workflow-level removed, declared once at job level.
# pull-requests: read is retained for git-cliff PR metadata fetching.

env:
  JAVA_VERSION: "25"
  MAVEN_OPTS: "-Xmx2048m -XX:+EnableDynamicAgentLoading"

# ──────────────────────────────────────────────────────────────
jobs:
  release:
    name: 🚀 Release ${{ inputs.release-version }}
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read        # KTESTIFY_CHANGELOG_PAT handles all writes to main
      id-token: write       # OIDC token for Maven Central trusted publishing
      pull-requests: read   # git-cliff: fetch PR metadata for changelog

    steps:
      # ── Input validation ──────────────────────────────────
      # IMPROVEMENT: Catch malformed versions before they touch git or pom.xml.
      - name: Validate version inputs
        run: |
          if [[ ! "${{ inputs.release-version }}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "ERROR: release-version must be X.Y.Z with no 'v' prefix and no '-SNAPSHOT'."
            echo "       Got: '${{ inputs.release-version }}'"
            exit 1
          fi
          if [[ ! "${{ inputs.next-snapshot-version }}" =~ ^[0-9]+\.[0-9]+\.[0-9]+-SNAPSHOT$ ]]; then
            echo "ERROR: next-snapshot-version must be X.Y.Z-SNAPSHOT."
            echo "       Got: '${{ inputs.next-snapshot-version }}'"
            exit 1
          fi
          echo "Versions validated: ${{ inputs.release-version }} → ${{ inputs.next-snapshot-version }}"

      # ── Checkout ──────────────────────────────────────────
      - name: Checkout (full history for tagging)
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.KTESTIFY_CHANGELOG_PAT }}
          fetch-depth: 0

      # ── Java & Maven ──────────────────────────────────────
      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven
          server-id: central
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD

      # ── GPG ───────────────────────────────────────────────
      - name: Import GPG signing key
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | \
            gpg --batch --import --no-tty
          KEY_FPR=$(gpg --list-secret-keys --with-colons 2>/dev/null \
                   | awk -F: '/^fpr/{print $10; exit}')
          echo "${KEY_FPR}:6:" | gpg --import-ownertrust --batch --no-tty
          echo "Imported key fingerprint: ${KEY_FPR}"

      # ── Set release version ───────────────────────────────────
      - name: Set pom.xml to release version ${{ inputs.release-version }}
        run: |
          mvn versions:set \
            -DnewVersion=${{ inputs.release-version }} \
            --no-transfer-progress
          mvn versions:commit --no-transfer-progress

      # ── Update README.md with release version ─────────────────
      # Two substitutions:
      #   1. shields.io version badge  — pattern: badge/version-<old>-6EE7B7
      #   2. Maven dependency snippet  — pattern: <version>…</version>
      - name: Update README.md to release version ${{ inputs.release-version }}
        run: |
          RELEASE_VERSION="${{ inputs.release-version }}"
          # 1. Version badge (shields.io encodes '-' as '--' in label text)
          sed -i -E \
            "s|(badge/version-)([^?]+)(-6EE7B7)|\1${RELEASE_VERSION}\3|" \
            README.md
          # 2. Maven <version> tag inside the dependency snippet
          sed -i -E \
            "s|(<version>)[0-9][^<]*(</version>)|\1${RELEASE_VERSION}\2|" \
            README.md
          echo "README.md updated → ${RELEASE_VERSION}"
          grep -E "badge/version|<version>" README.md | head -5

      # ── Build, test & sign ────────────────────────────────────
      # FIX 2: GPG passphrase moved from CLI arg to step-level env var.
      # Passing secrets as Maven -D flags exposes them in `ps` output and
      # runner debug logs. The shell variable ${GPG_PASSPHRASE} is expanded
      # at runtime without embedding the secret value in the command string.
      - name: Build with release profile (compile + test + GPG sign)
        run: |
          mvn verify -P release \
            --no-transfer-progress \
            -Dspotless.check.skip=true
        env:
          TESTCONTAINERS_RYUK_DISABLED: "true"
          MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

      # ── Publish ───────────────────────────────────────────
      - name: Publish to Maven Central
        if: inputs.dry-run == 'false'
        run: |
          mvn deploy -P release \
            --no-transfer-progress \
            -DskipTests \
            -Dspotless.check.skip=true
        env:
          MAVEN_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.CENTRAL_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

      # ── Commit, tag & push ────────────────────────────────
      - name: Commit release version, tag & push
        if: inputs.dry-run == 'false'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pom.xml README.md
          git commit -m "chore(release): prepare release ${{ inputs.release-version }} [skip ci]"
          git tag -a "v${{ inputs.release-version }}" \
            -m "Release ${{ inputs.release-version }}"
          git push origin main --follow-tags

      # ── Generate release notes with git-cliff ─────────────
      - name: Generate release notes (git-cliff)
        if: inputs.dry-run == 'false'
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --verbose --latest --strip header
        env:
          OUTPUT: RELEASE_NOTES.md
          GITHUB_REPO: ${{ github.repository }}
          GITHUB_TOKEN: ${{ secrets.KTESTIFY_CHANGELOG_PAT }}

      # ── Update CHANGELOG.md with the new release ──────────
      - name: Update CHANGELOG.md (git-cliff full history)
        if: inputs.dry-run == 'false'
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --verbose
        env:
          OUTPUT: CHANGELOG.md
          GITHUB_REPO: ${{ github.repository }}
          GITHUB_TOKEN: ${{ secrets.KTESTIFY_CHANGELOG_PAT }}

      - name: Bump to next SNAPSHOT ${{ inputs.next-snapshot-version }}
        if: inputs.dry-run == 'false'
        run: |
          mvn versions:set \
            -DnewVersion=${{ inputs.next-snapshot-version }} \
            --no-transfer-progress
          mvn versions:commit --no-transfer-progress

          NEXT_SNAPSHOT="${{ inputs.next-snapshot-version }}"
          # shields.io encodes '-' as '--', so "0.3.1-SNAPSHOT" → "0.3.1--SNAPSHOT"
          NEXT_SNAPSHOT_BADGE=$(echo "${NEXT_SNAPSHOT}" | sed 's/-/--/g')
          # 1. Version badge
          sed -i -E \
            "s|(badge/version-)([^?]+)(-6EE7B7)|\1${NEXT_SNAPSHOT_BADGE}\3|" \
            README.md
          # 2. Maven <version> tag
          sed -i -E \
            "s|(<version>)[0-9][^<]*(</version>)|\1${NEXT_SNAPSHOT}\2|" \
            README.md
          echo "README.md updated → ${NEXT_SNAPSHOT}"

          git add pom.xml CHANGELOG.md README.md
          git commit -m "chore(release): prepare next iteration ${{ inputs.next-snapshot-version }} [skip ci]"
          git push origin main

      # ── GitHub Release ────────────────────────────────────
      - name: Create GitHub Release
        if: inputs.dry-run == 'false'
        uses: softprops/action-gh-release@v3
        with:
          token: ${{ secrets.KTESTIFY_CHANGELOG_PAT }}
          tag_name: v${{ inputs.release-version }}
          name: "ktestify ${{ inputs.release-version }}"
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: false
          files: |
            target/ktestify-core.jar
            target/ktestify-core-sources.jar
            target/ktestify-core-javadoc.jar

      # ── FIX 3: Rollback on failure ────────────────────────
      # Runs only when a previous step has failed AND this is not a dry-run.
      # At this point the tag may or may not have been pushed depending on
      # which step failed. Both cases are handled safely.
      - name: Rollback on failure
        if: failure() && inputs.dry-run == 'false'
        run: |
          echo "A release step failed — attempting rollback..."
          TAG="v${{ inputs.release-version }}"

          # Delete remote tag if it was already pushed
          if git ls-remote --tags origin "$TAG" | grep -q "$TAG"; then
            git push origin --delete "$TAG" \
              && echo "Deleted remote tag $TAG" \
              || echo "Warning: could not delete remote tag $TAG — delete it manually."
          fi

          # Delete local tag if present
          git tag -d "$TAG" 2>/dev/null && echo "Deleted local tag $TAG" || true

          # Reset pom.xml, CHANGELOG.md and README.md to HEAD so main is clean
          git checkout HEAD -- pom.xml CHANGELOG.md README.md 2>/dev/null || true

          echo ""
          echo "Rollback complete."
          echo "Review the failure above, fix the root cause, then re-trigger the workflow."

      # ── Dry-run summary ───────────────────────────────────
      - name: Generate dry-run changelog preview
        if: inputs.dry-run == 'true'
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --verbose --unreleased --bump
        env:
          OUTPUT: RELEASE_NOTES_DRYRUN.md
          GITHUB_REPO: ${{ github.repository }}
          GITHUB_TOKEN: ${{ secrets.KTESTIFY_CHANGELOG_PAT }}

      - name: Dry-run summary
        if: inputs.dry-run == 'true'
        run: |
          echo "✅ Dry-run complete — artifacts were built & signed."
          echo "   Release version : ${{ inputs.release-version }}"
          echo "   Next SNAPSHOT   : ${{ inputs.next-snapshot-version }}"
          echo "   Nothing was published, tagged, or pushed."
          echo ""
          echo "📋 Release notes preview:"
          cat RELEASE_NOTES_DRYRUN.md