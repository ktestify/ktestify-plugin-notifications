# ============================================================
# Changelog — auto-update CHANGELOG.md on every merge to main
#
# Uses git-cliff (https://git-cliff.org) with the project's
# cliff.toml to generate a conventional-commit changelog.
#
# The generated CHANGELOG.md is committed directly to main
# so it is always up-to-date without any manual step.
#
# A dry-run preview is also generated on pull_request events
# and uploaded as an artifact for reviewers to inspect.
# ============================================================
name: Changelog

on:
  push:
    branches: [ main ]
    paths-ignore:
      - "CHANGELOG.md"      # don't re-trigger after the bot commit
      - "**.md"
      - "LICENSE"
  pull_request:
    branches: [ main ]
    paths-ignore:
      - "CHANGELOG.md"
      - "LICENSE"

permissions:
  contents: read
  pull-requests: read

# ──────────────────────────────────────────────────────────────
jobs:

  # ── Update CHANGELOG.md on main ───────────────────────────
  update-changelog:
    name: 📝 Update CHANGELOG.md
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read        # KTESTIFY_CHANGELOG_PAT handles the push to main
      pull-requests: read   # fetch PR metadata for git-cliff

    steps:
      - name: Checkout (full history for cliff)
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.KTESTIFY_CHANGELOG_PAT }}

      - name: Generate CHANGELOG.md with git-cliff
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
        env:
          OUTPUT: CHANGELOG.md
          GITHUB_REPO: ${{ github.repository }}
          GITHUB_TOKEN: ${{ secrets.KTESTIFY_CHANGELOG_PAT }}

      - name: Commit updated CHANGELOG.md
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Only commit if the file actually changed
          if git diff --quiet CHANGELOG.md; then
            echo "CHANGELOG.md is already up-to-date — nothing to commit."
          else
            git add CHANGELOG.md
            git commit -m "chore(release): update CHANGELOG.md [skip ci]"
            git push
          fi

  # ── PR preview (read-only, no push) ───────────────────────
  preview-changelog:
    name: 🔍 Preview changelog (unreleased)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write    # post / update the sticky preview comment

    steps:
      - name: Checkout (full history for cliff)
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Generate unreleased changelog preview
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          # Only show unreleased (since last tag)
          args: --verbose --unreleased
        env:
          OUTPUT: CHANGELOG-preview.md
          GITHUB_REPO: ${{ github.repository }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload preview artifact
        uses: actions/upload-artifact@v7
        with:
          name: changelog-preview-${{ github.run_id }}
          path: CHANGELOG-preview.md
          retention-days: 7

      # ── Write preview to job summary ─────────────────────
      - name: 📋 Write changelog preview to job summary
        run: |
          echo "## 📋 Unreleased Changelog Preview" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -s CHANGELOG-preview.md ]; then
            cat CHANGELOG-preview.md >> $GITHUB_STEP_SUMMARY
          else
            echo "_No unreleased changes found since the last tag._" >> $GITHUB_STEP_SUMMARY
          fi

      # ── Sticky PR comment ─────────────────────────────────
      # Updates the same comment on every push to keep the PR clean.
      - name: 💬 Post changelog preview to PR
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs   = require('fs');
            const marker  = '<!-- ktestify-changelog-preview -->';
            const runUrl  = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;

            let preview = '_No unreleased changes found since the last tag._';
            if (fs.existsSync('CHANGELOG-preview.md')) {
              const raw = fs.readFileSync('CHANGELOG-preview.md', 'utf8').trim();
              if (raw.length > 0) preview = raw;
            }

            const body = [
              marker,
              '## 📋 Unreleased Changelog Preview',
              '',
              '> This is what the next release notes will look like based on commits in this PR.',
              '',
              preview,
              '',
              '---',
              `*🔄 [Run #${process.env.GITHUB_RUN_NUMBER}](${runUrl}) · ${new Date().toUTCString()}*`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              issue_number: context.issue.number,
              per_page:     100,
            });

            const existing = comments.find(c => c.body?.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner:      context.repo.owner,
                repo:       context.repo.repo,
                comment_id: existing.id,
                body,
              });
              console.log(`✅ Updated changelog preview comment #${existing.id}`);
            } else {
              await github.rest.issues.createComment({
                owner:        context.repo.owner,
                repo:         context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
              console.log('✅ Created changelog preview comment');
            }