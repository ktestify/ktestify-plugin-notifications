# ktestify-plugin-myplugin — Dependabot Configuration
# TODO: Adapt the groups section to your transport's dependency ecosystem.
version: 2

updates:

  # ── Maven dependencies ────────────────────────────────────────────────────
  - package-ecosystem: maven
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Europe/Paris
    rebase-strategy: auto
    open-pull-requests-limit: 15
    labels:
      - dependencies
      - java
    commit-message:
      # "deps: bump …" → parsed by git-cliff into "⬆️ Dependency Updates"
      prefix: "deps"
      include: "scope"

    groups:
      # TODO: add a group for your transport SDK here.
      # Example for AWS SDK:
      #   aws:
      #     applies-to: version-updates
      #     patterns:
      #       - "software.amazon.awssdk:*"
      testcontainers:
        applies-to: version-updates
        patterns:
          - "org.testcontainers:*"
      junit5:
        applies-to: version-updates
        patterns:
          - "org.junit.jupiter:*"
          - "org.junit.platform:*"
      mockito:
        applies-to: version-updates
        patterns:
          - "org.mockito:*"
      logging:
        applies-to: version-updates
        patterns:
          - "org.slf4j:*"
          - "org.apache.logging.log4j:*"

  # ── GitHub Actions ────────────────────────────────────────────────────────
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Europe/Paris
    rebase-strategy: auto
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: "deps(ci)"
      include: "scope"
    groups:
      actions-core:
        applies-to: version-updates
        patterns: [ "actions/*" ]

